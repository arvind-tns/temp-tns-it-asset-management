# ============================================================================
# Base Application Configuration
# This file contains common configuration shared across all environments.
# Environment-specific settings are in application-{profile}.properties
# ============================================================================

# Application Metadata
spring.application.name=it-asset-management
server.port=${SERVER_PORT:8080}

# ============================================================================
# Database Configuration
# ============================================================================
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate Base Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# HikariCP Base Configuration (overridden in environment-specific files)
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-test-query=SELECT 1

# ============================================================================
# Flyway Database Migration
# ============================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.sql-migration-prefix=V
spring.flyway.sql-migration-separator=__
spring.flyway.sql-migration-suffixes=.sql
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# ============================================================================
# Logging Configuration
# ============================================================================
logging.level.root=INFO
logging.level.com.company.assetmanagement=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================================
# File Upload Configuration
# ============================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.resolve-lazily=false

# ============================================================================
# OpenAPI/Swagger Documentation
# ============================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false

# ============================================================================
# JWT Configuration
# ============================================================================
# JWT secret must be at least 256 bits (32 characters)
# Override in environment-specific files or via environment variables
jwt.secret=${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyMinimum256BitsRequired}
jwt.expiration=1800000
jwt.refresh-expiration=86400000

# ============================================================================
# CORS Configuration
# ============================================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ============================================================================
# Spring Security Configuration
# ============================================================================
spring.security.filter.order=10

# ============================================================================
# Actuator Configuration
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ============================================================================
# Session Configuration
# ============================================================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# ============================================================================
# Server Configuration
# ============================================================================
server.error.include-message=on-param
server.error.include-binding-errors=on-param
server.error.include-stacktrace=on-param
server.error.include-exception=false

# ============================================================================
# Jackson JSON Configuration
# ============================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ============================================================================
# Validation Configuration
# ============================================================================
spring.validation.enabled=true
