# Test Environment Configuration

# Database Configuration
spring.datasource.url=jdbc:sqlserver://TNS-IT-DESKTOP\SQLEXPRESS:1433;databaseName=IT_Asset;encrypt=true;trustServerCertificate=false
spring.datasource.username=itassetuser
spring.datasource.password=its@2345

# HikariCP Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=ITAssetManagementPool-Test

# JPA/Hibernate Settings
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false

# Logging Configuration
logging.level.root=WARN
logging.level.com.company.assetmanagement=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=1800000
jwt.refresh-expiration=86400000

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://test.example.com}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.clean-disabled=true

# Session Configuration
server.servlet.session.timeout=30m

# Test-specific settings
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
