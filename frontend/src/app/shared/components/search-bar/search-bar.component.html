<!--
  Search Bar Template - Ghost Border Search Input
  
  Implements search input with ghost border styling, editorial typography,
  and geometric hover effects following Editorial Geometry principles.
  
  Requirements: 5.1, 5.2, 5.3, 5.4, 5.5, 5.6, 5.7, 5.8, 25.5, 25.6
-->

<div class="search-bar">
  <div class="search-container">
    
    <!-- Search Icon - Requirement 5.2 -->
    <svg 
      class="search-icon" 
      width="10.5" 
      height="10.5" 
      viewBox="0 0 16 16" 
      fill="none" 
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true">
      <path 
        d="M7 13C10.3137 13 13 10.3137 13 7C13 3.68629 10.3137 1 7 1C3.68629 1 1 3.68629 1 7C1 10.3137 3.68629 13 7 13Z" 
        stroke="currentColor" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
      <path 
        d="M11.5 11.5L15 15" 
        stroke="currentColor" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
    </svg>
    
    <!-- Search Input - Requirements 5.1, 5.3, 5.4, 5.5, 5.6, 5.7, 5.8 -->
    <input 
      type="search"
      class="search-input"
      [placeholder]="placeholder"
      [(ngModel)]="value"
      (ngModelChange)="onInputChange($event)"
      (keypress)="onKeyPress($event)"
      aria-label="Search infrastructure items"
      autocomplete="off"
      spellcheck="false">
    
  </div>
</div>
