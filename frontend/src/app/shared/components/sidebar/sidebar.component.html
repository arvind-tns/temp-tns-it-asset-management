<mat-nav-list class="sidebar-nav">
  <a mat-list-item 
     *ngFor="let item of filteredMenuItems$ | async" 
     [routerLink]="item.route"
     routerLinkActive="active"
     class="nav-item">
    <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
    <span matListItemTitle>{{ item.label }}</span>
  </a>
</mat-nav-list>
