<!--
  Primary Action Button Template - Primary Action Button with Glassmorphism
  
  Implements "Add New Asset" button with Editorial Geometry styling,
  blue-tinted shadow effects, and glassmorphism for elevated states.
  
  Requirements: 10.1, 10.2, 10.3, 10.4, 10.5, 10.6, 10.7, 10.8, 22.5
-->

<button 
  class="primary-action-btn"
  [class.primary-action-btn--small]="size === 'small'"
  [class.primary-action-btn--medium]="size === 'medium'"
  [class.primary-action-btn--large]="size === 'large'"
  [class.primary-action-btn--full-width]="fullWidth"
  [class.primary-action-btn--loading]="loading"
  [disabled]="disabled || loading"
  type="button"
  (click)="onClick()">
  
  <!-- Loading Spinner -->
  <span *ngIf="loading" class="btn-spinner" aria-hidden="true">
    <svg 
      class="spinner-icon" 
      width="16" 
      height="16" 
      viewBox="0 0 24 24" 
      fill="none" 
      xmlns="http://www.w3.org/2000/svg">
      <circle 
        cx="12" 
        cy="12" 
        r="10" 
        stroke="currentColor" 
        stroke-width="4" 
        stroke-linecap="round" 
        opacity="0.25"/>
      <path 
        d="M12 2 A10 10 0 0 1 22 12" 
        stroke="currentColor" 
        stroke-width="4" 
        stroke-linecap="round"/>
    </svg>
  </span>
  
  <!-- Button Icon (optional) -->
  <span *ngIf="icon && !loading" class="btn-icon" aria-hidden="true">
    <svg 
      *ngIf="icon === 'add'"
      class="icon" 
      width="16" 
      height="16" 
      viewBox="0 0 24 24" 
      fill="none" 
      xmlns="http://www.w3.org/2000/svg">
      <path 
        d="M12 5V19M5 12H19" 
        stroke="currentColor" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
    </svg>
  </span>
  
  <!-- Button Text - Requirements 10.2, 10.3 -->
  <span class="btn-text">
    {{ loading ? 'Loading...' : label }}
  </span>
  
  <!-- Geometric Triangle Accent (background) -->
  <svg 
    class="geometric-accent" 
    width="100" 
    height="100" 
    viewBox="0 0 100 100" 
    fill="none" 
    xmlns="http://www.w3.org/2000/svg"
    aria-hidden="true">
    <path 
      d="M50 10 L90 90 L10 90 Z" 
      fill="currentColor" 
      opacity="0.1"/>
  </svg>
  
</button>
