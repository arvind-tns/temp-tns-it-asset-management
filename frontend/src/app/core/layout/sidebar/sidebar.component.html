<!--
  Sidebar Template - Editorial Geometry Navigation Panel
  
  Implements brand header, primary navigation, action button, and secondary navigation
  with geometric triangle accents and tonal layering.
  
  Requirements: 2.1, 2.2, 2.6, 2.7, 16.2, 21.6, 24.2
-->

<aside class="sidebar" role="navigation" aria-label="Primary navigation">
  
  <!-- Brand Header with Geometric Triangle Background -->
  <div class="sidebar__brand-header">
    <!-- Geometric Triangle Accent Background -->
    <app-geometric-triangle
      size="small"
      position="top-right"
      [color]="'#143b7d'"
      [opacity]="0.1">
    </app-geometric-triangle>
    
    <!-- Logo and Application Name -->
    <div class="brand-content">
      <div class="brand-logo">
        <div class="logo-icon" aria-hidden="true">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="40" height="40" rx="8" fill="#315396"/>
            <path d="M20 10L28 18H12L20 10Z" fill="white" opacity="0.9"/>
            <rect x="14" y="20" width="12" height="10" fill="white" opacity="0.9"/>
          </svg>
        </div>
      </div>
      <div class="brand-text">
        <h1 class="brand-name">AssetIntel</h1>
        <p class="brand-subtitle">Corporate IT - Global Infrastructure</p>
      </div>
    </div>
  </div>
  
  <!-- Primary Navigation Menu -->
  <nav class="sidebar__primary-nav" aria-label="Main navigation">
    <ul class="nav-list" role="list">
      <li 
        *ngFor="let item of primaryNavItems" 
        class="nav-item" 
        role="listitem">
        <a 
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{exact: false}"
          class="nav-link"
          [attr.aria-current]="isActiveRoute(item.route) ? 'page' : null"
          (click)="onNavigationClick(item)">
          <span class="nav-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
              <!-- Icon placeholder - will be replaced with actual icons -->
              <rect width="20" height="20" rx="2" fill="currentColor" opacity="0.3"/>
            </svg>
          </span>
          <span class="nav-text">{{ item.label }}</span>
        </a>
      </li>
    </ul>
  </nav>
  
  <!-- Primary Action Button -->
  <div class="sidebar__action-button">
    <app-primary-action-button
      label="Add New Asset"
      icon="add"
      [fullWidth]="true"
      (buttonClick)="onActionButtonClick()">
    </app-primary-action-button>
  </div>
  
  <!-- Secondary Navigation -->
  <nav class="sidebar__secondary-nav" aria-label="Secondary navigation">
    <ul class="nav-list secondary" role="list">
      <li 
        *ngFor="let item of secondaryNavItems" 
        class="nav-item" 
        role="listitem">
        <a 
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{exact: false}"
          class="nav-link"
          [attr.aria-current]="isActiveRoute(item.route) ? 'page' : null"
          (click)="onNavigationClick(item)">
          <span class="nav-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
              <!-- Icon placeholder - will be replaced with actual icons -->
              <rect width="20" height="20" rx="2" fill="currentColor" opacity="0.3"/>
            </svg>
          </span>
          <span class="nav-text">{{ item.label }}</span>
        </a>
      </li>
    </ul>
  </nav>
  
</aside>
